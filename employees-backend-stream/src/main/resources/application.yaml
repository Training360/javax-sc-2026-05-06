server:
  port: 8081

spring:
  application:
    name: employees-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/employees
    username: employees
    password: employees
  jpa:
    open-in-view: false
  liquibase:
    change-log: classpath:db/db-changelog.yaml
  cloud:
    stream:
      function:
        bindings:
          createEmployee-in-0: employees-backend-request
          createEmployee-out-0: employees-backend-response


logging:
  level:
    employees: DEBUG
    org.hibernate.SQL: TRACE
